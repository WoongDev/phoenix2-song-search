<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PUMP IT UP PHOENIX 2 레벨별 검색</title>
  <link rel="stylesheet" href="style.css?v=20260627-06" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="eyebrow">PUMP IT UP PHOENIX 2</p>
      <section class="notice-panel" aria-label="공지사항">
        <div class="notice-title">공지사항</div>
        <ul class="notice-list">
          <li>데이터는 PHOENIX 2 곡 리스트 기준이며, 발견되는 오류는 순차적으로 수정합니다.</li>
          <li>레벨별 검색에서는 0레벨과 8인 코옵을 제외하고 표시합니다.</li>
        </ul>
      </section>
      <nav class="page-nav" aria-label="검색 페이지 이동">
        <a class="nav-button" href="index.html">곡 이름 검색</a>
        <a class="nav-button active" href="level.html" aria-current="page">레벨별 검색</a>
      </nav>
      <h1>레벨별 곡 검색</h1>
      <p class="desc">스텝 타입과 레벨을 선택하면 해당 곡들을 한글 제목 기준으로 정렬해 보여줍니다.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="search-panel level-panel" aria-label="레벨별 검색 영역">
      <div class="button-control-block">
        <div class="control-title">스텝 타입</div>
        <div class="step-button-grid" role="group" aria-label="스텝 타입 선택">
          <button class="step-type-button single active" type="button" data-type="single" aria-pressed="true">
            <span class="badge-top">SINGLE</span>
            <span class="badge-main">싱글</span>
          </button>
          <button class="step-type-button double" type="button" data-type="double" aria-pressed="false">
            <span class="badge-top">DOUBLE</span>
            <span class="badge-main">더블</span>
          </button>
          <button class="step-type-button coop" type="button" data-type="coop" aria-pressed="false">
            <span class="badge-top">CO-OP</span>
            <span class="badge-main">코옵</span>
          </button>
        </div>
      </div>

      <div class="button-control-block">
        <div class="control-title" id="levelTitle">레벨</div>
        <div id="levelButtons" class="level-button-grid" role="group" aria-labelledby="levelTitle"></div>
      </div>

      <div class="meta-row">
        <span id="countText">데이터 불러오는 중...</span>
        <span class="hint">0레벨과 8인 코옵은 제외했습니다. 결과는 한글 제목 기준 가나다순입니다.</span>
      </div>
    </section>

    <section id="results" class="results level-results" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <div class="wrap">Data source: PHOENIX 2 song list JSON</div>
  </footer>

  <script src="level-search.js?v=20260627-06"></script>
</body>
</html>
