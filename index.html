<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PUMP IT UP PHOENIX 2 곡 검색</title>
  <link rel="stylesheet" href="style.css?v=20260627-06" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="eyebrow">PUMP IT UP PHOENIX 2</p>
      <section class="notice-panel" aria-label="공지사항">
        <div class="notice-title">공지사항</div>
        <ul class="notice-list">
          <li>데이터는 PHOENIX 2 곡 리스트 기준이며, 발견되는 오류는 순차적으로 수정합니다.</li>
          <li>레벨별 검색에서는 0레벨과 8인 코옵을 제외하고 표시합니다.</li>
        </ul>
      </section>
      <nav class="page-nav" aria-label="검색 페이지 이동">
        <a class="nav-button active" href="index.html" aria-current="page">곡 이름 검색</a>
        <a class="nav-button" href="level.html">레벨별 검색</a>
      </nav>
      <h1>곡 검색</h1>
      <p class="desc">한글 제목 또는 영문 제목을 입력하면 가장 가까운 곡을 찾아 레벨 정보를 보여줍니다.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="search-panel" aria-label="곡 검색 영역">
      <label for="searchInput">곡 이름</label>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="예: 고민중독, T.B.H, tbh" autocomplete="off" autofocus />
        <button id="clearButton" type="button">지우기</button>
      </div>
      <div class="meta-row">
        <span id="countText">데이터 불러오는 중...</span>
        <span class="hint">대소문자, 공백, 점(.) 일부 기호는 무시합니다.</span>
      </div>
    </section>

    <section id="results" class="results" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <div class="wrap">Data source: PHOENIX 2 song list JSON</div>
  </footer>

  <script src="search.js?v=20260627-06"></script>
</body>
</html>
